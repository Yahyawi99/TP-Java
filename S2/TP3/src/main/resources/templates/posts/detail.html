<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title th:text="${post.title}">Post Detail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
  <div class="container mt-5" style="max-width: 800px;">
    <a href="/posts" class="btn btn-link mb-3 p-0">← Back to Feed</a>

    <article class="bg-white p-5 rounded shadow-sm">
      <h1 class="display-4" th:text="${post.title}">Title</h1>
      <p class="lead" th:text="${post.content}">Full Content</p>
      <hr>

      <h4>Comments</h4>
      <div th:each="comment : ${post.comments}" class="border-start border-4 border-info ps-3 my-3">
        <p class="mb-1" th:text="${comment.content}">Comment text</p>
      </div>

      <form th:action="@{/posts/{id}/comments(id=${post.id})}" method="post" class="mt-4">
        <div class="input-group">
          <input type="text" name="commentContent" class="form-control" placeholder="Write a comment..." required>
          <button class="btn btn-dark" type="submit">Post</button>
        </div>
      </form>
    </article>
  </div>
</body>

</html>
