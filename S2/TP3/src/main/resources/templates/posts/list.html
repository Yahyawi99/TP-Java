<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>DevBlog | Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .blog-card {
      transition: transform 0.2s;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .blog-card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/posts">🚀 DevBlog</a>
      <a th:href="@{/posts/new}" class="btn btn-outline-light btn-sm">+ New Post</a>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div th:each="p : ${posts}" class="col-md-6 mb-4">
        <div class="card h-100 blog-card">
          <div class="card-body">
            <small class="text-primary fw-bold"
              th:text="${p.author != null ? p.author.username : 'Guest User'}">Author</small>
            <h3 class="card-title mt-2" th:text="${p.title}">Post Title</h3>
            <p class="card-text text-muted" th:text="${#strings.abbreviate(p.content, 100)}">Short preview...</p>

            <div class="d-flex justify-content-between align-items-center mt-4">
              <a th:href="@{/posts/{id}(id=${p.id})}" class="btn btn-primary btn-sm">Read More</a>
              <span class="badge bg-secondary" th:text="${#lists.size(p.comments) + ' comments'}">0 comments</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
