<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title th:text="${profileUser.username} + ' - Profile'">Profile</title>
  <link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" />
</head>

<body class="bg-gray-200 font-sans leading-normal tracking-normal">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <div class="flex items-center space-x-6">
        <img
          th:src="${profileUser.profile != null && profileUser.profile.avatar != null ? profileUser.profile.avatar : '/images/default-avatar.jpg'}"
          class="w-24 h-24 rounded-full object-cover" alt="Avatar" />
        <div>
          <h1 class="text-3xl font-bold text-gray-900" th:text="${profileUser.username}">Username</h1>
          <p class="text-sm text-gray-600" th:text="${profileUser.email}">email@example.com</p>
          <p class="text-xs text-gray-500" th:text="${profileUser.role}">ROLE</p>
        </div>
      </div>

      <div th:if="${currentUser != null and currentUser.id == profileUser.id}" class="mt-6">
        <h2 class="text-xl font-semibold mb-4">Edit Profile</h2>
        <form th:action="@{/users/{id}/profile(id=${profileUser.id})}" method="post" class="space-y-4">
          <div>
            <label for="bio" class="block text-sm font-medium text-gray-700">Bio</label>
            <textarea id="bio" name="bio" rows="4"
              class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
              th:text="${profileUser.profile != null ? profileUser.profile.bio : ''}">Bio text</textarea>
          </div>
          <div>
            <label for="avatar" class="block text-sm font-medium text-gray-700">Avatar URL</label>
            <input type="url" id="avatar" name="avatar"
              class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
              th:value="${profileUser.profile != null ? profileUser.profile.avatar : ''}" />
          </div>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">Update
            Profile</button>
        </form>
      </div>

      <div class="mt-6">
        <h2 class="text-xl font-semibold mb-2">Bio</h2>
        <p class="text-gray-700"
          th:text="${profileUser.profile != null ? profileUser.profile.bio : 'No bio available.'}">
          No bio available.
        </p>
      </div>

      <div class="mt-8">
        <a th:href="@{/posts}" class="text-blue-500 hover:underline">Back to posts</a>
      </div>
    </div>
  </div>
</body>

</html>
