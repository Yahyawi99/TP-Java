<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>All Users - My Blog</title>
  <meta name="author" content="name">
  <meta name="description" content="List of all users">
  <meta name="keywords" content="blog,users,admin">
  <link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
</head>

<body class="bg-gray-200 font-sans leading-normal tracking-normal">

  <!--Header-->
  <div class="w-full m-0 p-0 bg-cover bg-bottom"
    style="background-image:url('/images/cover.jpg'); height: 40vh; max-height:320px;">
    <div class="container max-w-4xl mx-auto pt-16 md:pt-20 text-center break-normal">
      <!--Title-->
      <p class="text-white font-extrabold text-3xl md:text-5xl">
        👥 All Users
      </p>
      <p class="text-lg md:text-xl text-gray-300">Admin Panel</p>
    </div>
  </div>

  <!--Container-->
  <div class="container px-4 md:px-0 max-w-6xl mx-auto -mt-24">

    <div class="mx-0 sm:mx-6">

      <!--Nav-->
      <nav class="mt-0 w-full">
        <div class="container mx-auto flex items-center justify-between">
          <div class="flex items-center text-sm">
            <ul class="list-reset flex space-x-4 items-center">
              <li>
                <a class="inline-block py-2 px-2 text-gray-700 hover:text-gray-900" th:href="@{/posts}">POSTS</a>
              </li>
              <li>
                <a class="inline-block py-2 px-2 text-gray-700 hover:text-gray-900" th:href="@{/posts/new}">NEW POST</a>
              </li>
              <li th:if="${currentUser != null}">
                <span class="text-gray-800">Welcome, <strong th:text="${currentUser.username}">User</strong></span>
              </li>
            </ul>
          </div>
          <div th:if="${currentUser != null}">
            <form th:action="@{/users/logout}" method="post" class="inline">
              <button type="submit" class="text-gray-700 hover:text-gray-900">Logout</button>
            </form>
          </div>

          <div class="flex w-1/2 justify-end content-center">
            <a class="inline-block text-gray-500 no-underline hover:text-white text-center h-10 p-2 md:h-auto md:p-4"
              href="https://twitter.com/intent/tweet?url=#">
              <svg class="fill-current h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                <path
                  d="M30.063 7.313c-.813 1.125-1.75 2.125-2.875 2.938v.75c0 1.563-.188 3.125-.688 4.625a15.088 15.088 0 0 1-2.063 4.438c-.875 1.438-2 2.688-3.25 3.813a15.015 15.015 0 0 1-4.625 2.563c-1.813.688-3.75 1-5.75 1-3.25 0-6.188-.875-8.875-2.625.438.063.875.125 1.375.125 2.688 0 5.063-.875 7.188-2.5-1.25 0-2.375-.375-3.375-1.125s-1.688-1.688-2.063-2.875c.438.063.813.125 1.125.125.5 0 1-.063 1.5-.25-1.313-.25-2.438-.938-3.313-1.938a5.673 5.673 0 0 1-1.313-3.688v-.063c.813.438 1.688.688 2.625.688a5.228 5.228 0 0 1-1.875-2c-.5-.875-.688-1.813-.688-2.75 0-1.063.25-2.063.75-2.938 1.438 1.75 3.188 3.188 5.25 4.25s4.313 1.688 6.688 1.813a5.579 5.579 0 0 1 1.5-5.438c1.125-1.125 2.5-1.688 4.125-1.688s3.063.625 4.188 1.813a11.48 11.48 0 0 0 3.688-1.375c-.438 1.375-1.313 2.438-2.563 3.188 1.125-.125 2.188-.438 3.313-.875z">
                </path>
              </svg>
            </a>
            <a class="inline-block text-gray-500 no-underline hover:text-white text-center h-10 p-2 md:h-auto md:p-4"
              href="https://www.facebook.com/sharer/sharer.php?u=#">
              <svg class="fill-current h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                <path d="M19 6h5V0h-5c-3.86 0-7 3.14-7 7v3H8v6h4v16h6V16h5l1-6h-6V7c0-.542.458-1 1-1z">
                </path>
              </svg>
            </a>
          </div>

        </div>
      </nav>

      <div class="bg-gray-200 w-full text-xl md:text-2xl text-gray-800 leading-normal rounded-t">

        <!-- Users List Card -->
        <div class="max-w-4xl mx-auto bg-white rounded-xl overflow-hidden shadow-lg mb-6 mt-8">
          <div class="p-8">
            <div class="text-center mb-6">
              <h1 class="text-3xl font-bold text-gray-900">All Registered Users</h1>
              <p class="text-gray-500 mt-2">Admin view of all user accounts</p>
            </div>

            <!-- Users Table -->
            <div class="overflow-x-auto">
              <table class="min-w-full table-auto">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username
                    </th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email
                    </th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Bio</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Avatar
                    </th>
                  </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                  <tr th:each="user : ${users}" class="hover:bg-gray-50">
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900" th:text="${user.id}">1</td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900" th:text="${user.username}">username
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900" th:text="${user.email}">
                      email@example.com</td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900" th:text="${user.role}">USER</td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900"
                      th:text="${user.profile != null ? user.profile.bio : 'N/A'}">Bio</td>
                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900">
                      <a th:href="@{/users/{id}(id=${user.id})}" class="flex items-center gap-2">
                        <img class="w-8 h-8 rounded-full object-cover"
                          th:src="${user.profile != null && user.profile.avatar != null ? user.profile.avatar : '/images/default-avatar.jpg'}"
                          alt="avatar" />
                        <span
                          th:text="${user.profile != null && user.profile.avatar != null ? 'View' : 'No Avatar'}">View</span>
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Back Button -->
            <div class="mt-6 text-center">
              <a th:href="@{/posts}"
                class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-200">
                Back to Posts
              </a>
            </div>

          </div>
        </div>

      </div>

    </div>

  </div>

  <!--Footer-->
  <footer class="bg-gray-900 mt-12">
    <div class="container max-w-6xl mx-auto flex items-center px-2 py-8">

      <div class="w-full mx-auto flex flex-wrap items-center">
        <div class="flex w-full md:w-1/2 justify-center md:justify-start text-white font-extrabold">
          <a class="text-gray-900 no-underline hover:text-gray-900 hover:no-underline" th:href="@{/posts}">
            📝 <span class="text-base text-gray-200">My Blog Platform</span>
          </a>
        </div>
        <div class="flex w-full pt-2 content-center justify-between md:w-1/2 md:justify-end">
          <ul class="list-reset flex justify-center flex-1 md:flex-none items-center">
            <li><a class="inline-block text-gray-600 no-underline hover:text-gray-200 hover:text-underline py-2 px-2"
                href="#">link</a></li>
            <li><a class="inline-block text-gray-600 no-underline hover:text-gray-200 hover:text-underline py-2 px-2"
                href="#">link</a></li>
          </ul>
        </div>
      </div>
    </div>
  </footer>

</body>

</html>
